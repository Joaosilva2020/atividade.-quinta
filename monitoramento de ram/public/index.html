<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de RAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96">
    
    <h1 class="text-2xl font-bold mb-6 text-center">
      Monitoramento de RAM
    </h1>

    <div class="space-y-4">

      <p>Total: <span id="total" class="font-semibold text-green-400">--</span> MB</p>
      <p>Usada: <span id="used" class="font-semibold text-red-400">--</span> MB</p>
      <p>Livre: <span id="free" class="font-semibold text-blue-400">--</span> MB</p>

  
      <div>
        <p class="mb-1">Uso:</p>
        <div class="w-full bg-gray-700 rounded-full h-4">
          <div id="barra"
               class="bg-green-500 h-4 rounded-full transition-all duration-500"
               style="width: 0%">
          </div>
        </div>
      </div>

   
      <div class="mt-4">
        <label class="block text-sm mb-1">Limite de uso (%)</label>
        <div class="flex gap-2">
          <input 
            type="number" 
            id="limiteInput" 
            class="w-20 px-2 py-1 rounded bg-gray-700 text-white"
            min="1" max="100"
            placeholder="80">
          <button 
            onclick="definirLimite()" 
            class="bg-blue-500 px-3 py-1 rounded hover:bg-blue-600 transition">
            Definir
          </button>
        </div>
      </div>

  
      <p id="alerta" class="mt-3 font-semibold text-red-400 text-center"></p>

    </div>

  </div>

  <script src="monitor_ram.js"></script>

</body>
</html>
</body>
</html>
